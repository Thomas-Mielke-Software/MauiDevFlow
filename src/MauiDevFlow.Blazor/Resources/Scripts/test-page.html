<!DOCTYPE html>
<html>
<head>
    <title>Chobitsu Debug Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .status.ready { background: #d4edda; color: #155724; }
        .status.waiting { background: #fff3cd; color: #856404; }
        .status.error { background: #f8d7da; color: #721c24; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Chobitsu Debug Server</h1>
    <div id="status" class="status waiting">Initializing...</div>
    
    <h2>Connection Info</h2>
    <p>WebSocket Port: <code>%PORT%</code></p>
    <p>Connect using: <code>ws://&lt;device-ip&gt;:%PORT%</code></p>
    
    <h2>Test Controls</h2>
    <button onclick="testConsoleLog()">Test console.log</button>
    <button onclick="testError()">Test Error</button>
    <button onclick="testDomChange()">Test DOM Change</button>
    
    <h2>Log</h2>
    <pre id="log"></pre>
    
    <script>
        function log(msg) {
            var el = document.getElementById('log');
            el.textContent += new Date().toISOString() + ' - ' + msg + '\n';
        }
        
        function updateStatus(status, className) {
            var el = document.getElementById('status');
            el.textContent = status;
            el.className = 'status ' + className;
        }
        
        function testConsoleLog() {
            console.log('Test message from button click');
            log('Sent console.log message');
        }
        
        function testError() {
            throw new Error('Test error from button click');
        }
        
        function testDomChange() {
            var div = document.createElement('div');
            div.textContent = 'Dynamic element added at ' + new Date().toISOString();
            document.body.appendChild(div);
            log('Added DOM element');
        }
        
        // Listen for Chobitsu ready event
        window.addEventListener('chobitsuReady', function(e) {
            updateStatus('✅ Debug server ready on port ' + e.detail.port, 'ready');
            log('Chobitsu initialized on port ' + e.detail.port);
        });
        
        %INJECTION_SCRIPT%
    </script>
</body>
</html>
